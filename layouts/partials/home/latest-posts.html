{{ $posts := first 3 (where site.RegularPages "Section" "blog") }}
<section class="space-y-4" aria-labelledby="latest-posts-heading">
  <div class="flex items-end justify-between">
    <h2 id="latest-posts-heading" class="text-2xl font-extrabold text-neutral-900">Latest Articles</h2>
    <a href="{{ "/blog/" | relLangURL }}" class="text-sm font-semibold text-primary-600 hover:underline">Browse blog</a>
  </div>
  <div class="grid gap-5 md:grid-cols-3">
    {{ range $posts }}
      <article class="overflow-hidden rounded-2xl border border-neutral-200 bg-white shadow-sm">
        <a href="{{ .RelPermalink }}"><img src="{{ (.Params.featureimage | default "/images/featured/build-tools.svg") | relURL }}" alt="{{ .Title }}" class="h-44 w-full object-cover" loading="lazy"></a>
        <div class="space-y-3 p-5">
          <p class="text-xs font-semibold uppercase tracking-wide text-neutral-500">{{ .Date | time.Format "January 2, 2006" }}</p>
          <h3 class="text-lg font-extrabold text-neutral-900"><a href="{{ .RelPermalink }}" class="hover:text-primary-600">{{ .Title }}</a></h3>
          <a href="{{ .RelPermalink }}" class="inline-block rounded-full bg-neutral-900 px-4 py-2 text-xs font-bold text-white hover:bg-neutral-700" role="button">Read Article</a>
        </div>
      </article>
    {{ end }}
  </div>
</section>
